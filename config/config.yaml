agents:
  enabled: true

  # ── LLM ─────────────────────────────────────────────────────────
  # Primary: vLLM (production GPU server).
  # Fallback: Ollama (local CPU/GPU, auto-detected if vLLM unreachable).
  # If neither is available, agents return score-based fallback only.
  llm:
    provider: vllm                 # vllm (default) or ollama
    model: meta-llama/Llama-3.1-70B-Instruct   # vLLM model identifier
    max_tokens: 8192
    temperature: 0.3
    max_retries: 2
    timeout: 180                   # per-LLM-call HTTP timeout (seconds)
    per_agent_timeout: 150         # per-agent budget inside the pipeline
    pipeline_timeout: 900          # whole-anomaly budget across all agents
    request_params:
      top_p: 0.95

    # Ollama fallback -- used automatically if vLLM is unreachable.
    # Install: curl -fsSL https://ollama.com/install.sh | sh
    # Pull a model: ollama pull qwen2.5:14b
    ollama:
      base_url: http://localhost:11434/v1
      model: qwen2.5:14b

  # ── Context injection (formerly "MCP") ──────────────────────────
  context_injection:
    enabled: true
    include_history: true

  # ── Prior-context propagation (formerly "a2a") ──────────────────
  # Sequential context-passing.  Each agent's response is added to a
  # per-anomaly history block subsequent agents see.  This is NOT
  # bidirectional dialogue.
  prior_context_enabled: true

  # ── Reflexion loop ─────────────────────────────────────────────
  # Applied to the proactive 2-agent tier only (security_analyst + remediation).
  # A critic LLM call scores each agent's output on 3 criteria (specific,
  # actionable, temporal).  If any criterion is missing, the agent is re-run
  # once with the critic's feedback injected into the prompt.
  # Adds at most ~200s per proactive run (45s critic + 150s retry if needed).
  reflexion:
    enabled: true
    max_reflections: 1               # max retries per agent (keep to 1 for proactive)
    agents:                          # which agents in the proactive tier to critique
      - security_analyst
      - remediation

  # ── Token budget guardrails ─────────────────────────────────────
  context_window_tokens: 16000

  # ── Output schema enforcement ───────────────────────────────────
  # When true, the security_analyst, threat_intel, and security_critic
  # agents are asked to return JSON.  Far more reliable than regex.
  structured_output: true

  # ── Per-agent system prompts (loaded by AgentManager) ───────────
  prompts:
    security_analyst: |
      You are a senior security analyst with 15+ years of experience.
      Analyse the anomaly and identify:
      1. Severity (critical/high/medium/low) with justification
      2. Type of potential threat
      3. Whether it is likely a false positive (with confidence %)
      4. Key indicators of compromise
      5. Immediate concerns

    threat_intel: |
      You are a threat intelligence specialist.  Building on the
      prior security analysis, provide:
      1. Known threat patterns that match this anomaly
      2. MITRE ATT&CK technique mapping where applicable
      3. Indicators of compromise (IoCs)
      4. Related threat actors or campaigns
      5. Historical context

    remediation: |
      You are an incident response team lead.  Using the prior
      analysis and threat intel, provide:
      1. Immediate containment steps (0-15 min)
      2. Investigation procedures (15 min - 2 hr)
      3. Long-term remediation actions
      4. Prevention measures
      5. Validation criteria

    code_generator: |
      You are a security automation engineer.  Generate concise,
      production-ready scripts and detection rules implementing the
      remediation plan.  Include detection scripts with logging and
      error handling, automation snippets where safe, and monitoring
      queries for the relevant platform.  Add inline comments.

    security_review: |
      You are a security reviewer.  Critically evaluate ALL prior
      agent outputs and identify logical gaps, missed threats,
      remediation completeness issues, and your overall confidence.

    security_critic: |
      You are a skeptical security critic.  Assess the full pipeline
      output and explicitly state false-positive likelihood (with
      reasoning), alternative benign explanations, evidence quality
      (1-10), and whether the proposed response is proportionate.

    data_collector: |
      You are a digital forensics expert.  Specify volatile data to
      collect immediately, system artefacts to preserve, log sources
      and timeframes, correlation opportunities, and evidence
      preservation procedures.

# ── Correlation Analysis ─────────────────────────────────────────
correlation:
  enabled: true
  default_time_window_hours: 24
  default_min_score: 0.3
  max_results_per_query: 50

  # Scoring weights — tune these to emphasise what matters most.
  weights:
    same_host: 0.50          # multiple services failing on one host
    same_check_type: 0.40    # systemic infrastructure problem
    same_host_address: 0.30  # same IP address
    same_subnet: 0.15        # same /24 network segment
    same_location: 0.20      # same generic location field
    similar_score: 0.10      # anomaly scores within ±0.1
    same_model: 0.05         # detected by the same model
    time_proximity_max: 0.30 # max contribution from time closeness
    feature_similarity: 0.20 # max contribution from feature-vector cosine
    severity_bonus: 0.15     # bonus when both anomalies are high/critical
    model_agreement: 0.25    # bonus when multiple models flag same entity

  # Caching — avoids recomputing correlations that haven't changed.
  cache:
    enabled: true
    ttl_seconds: 300         # cache entries expire after 5 minutes

  # Temporal pattern detection
  temporal:
    enabled: true
    min_recurrences: 3       # need at least N occurrences to call it a pattern
    time_tolerance_minutes: 30  # events within this window count as "same time"
    lookback_days: 30        # how far back to look for recurring patterns

  # AI-enhanced correlation analysis — uses the LLM to add intelligence
  # on top of rule-based correlation scoring.  Requires agents.enabled=true
  # and a working LLM provider (vLLM or Ollama).
  ai:
    enabled: true
    enhance_correlations: true   # LLM causal chain + hidden relationships
    enhance_temporal: true       # LLM root cause hypothesis for recurring patterns
    enhance_incidents: true      # LLM validation of incident root causes
    max_correlations_to_enhance: 10  # max correlated anomalies sent to LLM
    timeout: 120                 # per-LLM-call timeout for correlation analysis

proactive:
  enabled: true
  scan_interval_seconds: 300
  trend_window_hours: 6
  deviation_threshold_pct: 30.0
  min_baseline_points: 10
  max_points_per_metric: 500
  customer_trend_mode: enabled
  customer_deviation_threshold_pct: 50.0
  max_alerts_per_customer_per_hour: 4
  trend_energy_threshold: 1.0
  route_to_alert_manager: true

alerts:
  enabled: true
  threshold_score: 0.8
  dedup_window_minutes: 30
  alerts_dir: storage/alerts
  channels:
    - console
    - file
    - webhook

  # ── Suppression Rules ──────────────────────────────────────────
  # Rules that prevent noisy or low-value anomalies from generating alerts.
  # Each rule has: source (data source type), field, operator, value, reason.
  # Operators: eq, ne, gt, lt, gte, lte, in, contains, exists, not_exists
  # Set enabled: false on any rule to disable it without removing it.
  suppression_rules:
    # --- Nagios XI Rules ---
    - name: nagios_ok_state
      source: nagiosxi
      field: current_state
      operator: eq
      value: "0"
      reason: "Service is in OK state — no problem"
      enabled: true

    - name: nagios_soft_non_critical
      source: nagiosxi
      field: state_type
      operator: eq
      value: "0"
      extra_condition:
        field: current_state
        operator: ne
        value: "2"
      reason: "SOFT state for non-CRITICAL service — transient, may self-recover"
      enabled: true

    - name: nagios_scheduled_downtime
      source: nagiosxi
      field: scheduled_downtime_depth
      operator: gt
      value: "0"
      reason: "In scheduled downtime — planned maintenance"
      enabled: true

    - name: nagios_stale_check
      source: nagiosxi
      field: should_be_scheduled
      operator: eq
      value: "0"
      extra_condition:
        field: has_been_checked
        operator: eq
        value: "1"
      reason: "Stale check — ran previously but no longer scheduled"
      enabled: true

    - name: nagios_unknown_state
      source: nagiosxi
      field: current_state
      operator: eq
      value: "3"
      reason: "Check is in UNKNOWN state — the monitoring plugin itself failed to run (permission error, timeout, etc.). This is a monitoring infrastructure problem, not a service problem. No actionable alert."
      enabled: true

    - name: nagios_unknown_state_numeric
      source: nagiosxi
      field: current_state
      operator: eq
      value: "unknown"
      reason: "Check state is UNKNOWN — plugin failed to execute. Not actionable."
      enabled: true

    - name: nagios_no_host_identity
      source: nagiosxi
      field: host_name
      operator: empty_or_missing
      reason: "No host identity in data — cannot determine what is affected. Likely a data collection or field-mapping issue. Fix the data source before alerting."
      enabled: true

    - name: nagios_acknowledged
      source: nagiosxi
      field: problem_has_been_acknowledged
      operator: eq
      value: "1"
      reason: "Problem already acknowledged by operator"
      enabled: false  # Disabled — acknowledged problems may still need alerting

    - name: nagios_notifications_disabled
      source: nagiosxi
      field: notifications_enabled
      operator: eq
      value: "0"
      reason: "Notifications disabled by admin — intentionally suppressed"
      enabled: false  # Disabled — may want ML to flag even suppressed services

    # --- Global Rules (apply to all sources) ---
    - name: low_score_filter
      source: "*"
      field: _score
      operator: lt
      value: "0.3"
      reason: "Anomaly score too low to warrant an alert"
      enabled: false  # Disabled — threshold_score already handles this
  email:
    smtp_server: smtp.landisgyr.com
    port: 587
    sender: alerts@landisgyr.com
    recipients:
      - admin@landisgyr.com
    include_analysis_summary: true
    include_remediation_steps: true
    include_confidence_scores: true
  webhook:
    url: http://landisgyr.com/webhook
    auth_token: ${WEBHOOK_AUTH_TOKEN}     # set in environment, never commit secrets
    include_full_analysis: true
    include_evidence_chain: true
 
collectors:
  enabled:
    - file
    - rest_api
  file:
    paths:
      - data/input/
      - data/input/*.json
    watch_interval_seconds: 60
    batch_size: 100
  kafka:
    bootstrap_servers: localhost:9092
    topics:
      - name: security-events
        group_id: anomaly_detection_group
    consumer_timeout_ms: 5000
    batch_size: 100
  sql:
    batch_size: 1000
    timeout_seconds: 300
    connections:
      - name: postgres_main
        dialect: postgresql
        host: ${DB_HOST:-localhost}
        port: ${DB_PORT:-5432}
        database: ${DB_NAME:-mydatabase}
        user: ${DB_USER:-myuser}
        password: ${DB_PASSWORD}            # required env var, never commit
        queries:
          - name: system_metrics
            sql: "SELECT * FROM system_metrics WHERE timestamp > :last_timestamp ORDER BY timestamp DESC LIMIT :limit"
            params:
              last_timestamp: "2024-01-01T00:00:00Z"
              limit: 1000
          - name: user_logins
            sql: "SELECT user_id, login_time, ip_address, success FROM user_logins WHERE login_time > NOW() - INTERVAL '24 hours'"
  rest_api:
    batch_size: 1000 # Max items to process per collection run
    timeout_seconds: 60
    max_retries: 5
    retry_backoff: 1.0 # Longer backoff for Nagios XI to avoid overwhelming it
    min_interval_seconds: 5 # Rate limit to 1 request every 5 seconds for THIS COLLECTOR INSTANCE (across all Nagios servers)
 
    # You can remove 'authentication' if all auth is handled by CSV
    # authentication:
    #   type: api_key
    #   key_name: apikey
    #   key_value: "YOUR_GLOBAL_API_KEY_IF_ANY" # This would be used if NO endpoint has specific auth
 
    # --- Nagios XI Specific Configuration ---
    # Path to the CSV file containing Nagios XI server URLs and API keys
    nagios_xi_config_file: "config/nagios_servers.csv"
 
    # Default settings for all Nagios XI endpoints loaded from the CSV
    nagios_xi_defaults:
      params:
        pretty: 1
        output: json
        # Add any other global Nagios XI specific parameters here if needed
        # For example, to filter by host group across all servers by default:
        # hostgroup_name: "production_servers"
      verify_ssl: False
      data_path: servicestatus  # Extract the service status array from {"recordcount": N, "servicestatus": [...]}
      transform:
        # Optional: Map Nagios XI fields to your internal anomaly detection system's field names
        field_mapping:
          host_name: monitor_host
          service_description: monitor_service
          current_state: service_status_code
          current_state_text: service_status_text
          last_check: last_monitored_time
          # Add more mappings as needed
        include_unmapped: True # Keep other fields from Nagios XI response
 
    # 'endpoints' list is now empty or contains other non-NagiosXI REST API endpoints
    endpoints:
      # - name: some_other_api_endpoint
      #   url: https://api.example.com/data
      #   method: GET
      #   authentication:
      #     type: bearer
      #     token: "some_token"
 
database:
  type: sqlite
  path: storage/anomaly_detection.db
  # Enhanced database settings for agent results
  store_agent_dialogue: true
  store_evidence_chains: true
  store_confidence_metrics: true
 
knowledge_base: {}
 
models:
  enabled:
    - isolation_forest
    - statistical
    - autoencoder
    - gan
    - one_class_svm
    - ecod
    - extended_iforest
    - ensemble
  isolation_forest:
    contamination: 0.01  # Conservative — only flag strong outliers
    n_estimators: 200
    random_state: 42
    threshold: 0.95      # Very high — only the clearest anomalies
  one_class_svm:
    kernel: rbf
    nu: 0.05
    gamma: scale
    threshold: 0.75
  autoencoder:
    hidden_dims: [128, 64, 32]
    activation: relu
    dropout_rate: 0.2
    learning_rate: 0.001
    epochs: 50
    batch_size: 32
    threshold: 0.75
  gan:
    latent_dim: 100
    epochs: 200
    batch_size: 32
    learning_rate: 0.0002
    beta_1: 0.5
    dropout_rate: 0.3
    random_state: 42
    detection_strategy: reconstruction
    threshold: 0.75
  statistical:
    window_size: 10
    threshold_multiplier: 2.0
    threshold: 0.75
  ecod:
    contamination: 0.01
    threshold: 0.7
  extended_iforest:
    n_estimators: 100
    contamination: 0.01
    random_state: 42
    # extension_level defaults to n_features - 1 (full EIF) at train time
    threshold: 0.7
  ensemble:
    # Require minimum 2 models to agree before ensemble flags an anomaly
    min_models_agree: 2
    weights:
      isolation_forest_model: 0.6
      statistical_model: 0.4
      autoencoder_model: 0.5
      gan_model: 0.3
      one_class_svm_model: 0.5
      ecod: 0.5
      extended_iforest: 0.5
    models_to_use:
      - isolation_forest_model
      - statistical_model
      - autoencoder_model
      - gan_model
      - one_class_svm_model
      - ecod
      - extended_iforest
    threshold: 0.75
  # Heavier deep models — disabled by default; add to 'enabled' list to activate.
  # Requires deepod>=0.4 (deep_iforest) and torch>=2.0 (deep_sad).
  deep_iforest:
    n_ensemble: 6
    hidden_dims: "64"    # comma-separated MLP widths per DeepOD API, e.g. "128,64"
    rep_dim: 64
    epochs: 100
    batch_size: 64
    lr: 0.001
    threshold: 0.75
    # device: cpu        # uncomment to force CPU even when CUDA is available
  deep_sad:
    hidden_dims: [32, 16]
    rep_dim: 16
    lr: 0.001
    n_epochs: 50
    batch_size: 64
    weight_decay: 0.000001
    eps: 0.000001
    threshold: 0.75
    # device: cpu        # uncomment to force CPU even when CUDA is available
 
processors:
  normalizers:
    - name: generic_normalizer
      type: json
      timestamp_field: timestamp
  feature_extractors:
    - name: basic_features
      fields: ["*"]
      sources_dir: "config/sources"   # SourceRegistry resolves fields per-source
      categorical_encoding: hash
      use_real_embeddings: false
      imputation_strategy: median
      # No hardcoded field lists — per-source schemas in config/sources/
      # define numerical, boolean, categorical, and text fields for each
      # data source (nagiosxi.yaml).
      # The SourceRegistry auto-detects the source from marker fields
      # and applies the correct schema.
      # Version strings parsed into (major, minor, patch, build) numeric features
      version_fields:
        - agentVersion
      # High-cardinality fields replaced with observed frequency count
      frequency_encoded_fields:
        - computerName
      # Known-ordered categoricals mapped to explicit integer severity levels
      ordered_enum_fields:
        appsVulnerabilityStatus:
          up_to_date: 0
          patch_required: 1

anomaly_retention:
  max_age_days: 30
  keep_confirmed: true
  auto_cleanup: true

severity:
  thresholds:
    critical: 0.9
    high: 0.8
    medium: 0.6
    # Scores below medium threshold are classified as "Low"

  # Context-aware score adjustments for Nagios data.
  # These reduce the effective anomaly score when monitoring context
  # indicates the anomaly is less actionable.
  # Set any multiplier to 1.0 to disable that adjustment.
  score_adjustments:
    soft_state: 0.60           # SOFT state (transient, may self-recover)
    scheduled_downtime: 0.50   # Planned maintenance
    acknowledged: 0.70         # Operator already aware
    flapping: 0.75             # Unstable / noisy signal
    notifications_disabled: 0.80  # Admin intentionally suppressed
    stale_critical_days: 7     # Days before a CRITICAL is considered stale
    stale_multiplier: 0.85     # Score reduction for stale CRITICALs

proactive:
  enabled: true
  # How often the background scanner checks for trending metrics (seconds)
  scan_interval_seconds: 300  # 5 minutes
  # How many hours of recent data to compute trend slope
  trend_window_hours: 6
  # Minimum % deviation from baseline to generate a proactive alert
  deviation_threshold_pct: 30
  # Minimum data points before a baseline is considered valid
  min_baseline_points: 10
  # Maximum data points to retain per metric (older points evicted)
  max_points_per_metric: 500
  # Persist metric history to SQLite (survives restarts)
  persist_to_db: true
  # Customer/zone mapping: extract from Nagios host_alias naming convention
  # Pattern to parse customer/zone from host_alias (regex with named groups)
  customer_zone_pattern: '(?P<customer>\w+)\s.*(?P<zone>Z\d+_[A-Z])'
  # Route proactive alerts through AlertManager (webhook/email/console)
  route_to_alert_manager: true
  # Route imminent-breach proactive alerts through the 2-agent reasoning loop
  # (security_analyst + remediation) for LLM-generated triage and remediation steps.
  route_to_agent_analysis: true
  agent_analysis_hours_to_critical: 2  # only analyze if breach predicted within N hours
  agent_analysis_cooldown_hours: 4     # minimum hours between LLM calls for the same metric
  # Only generate proactive alerts for metrics with score above this
  min_alert_severity: medium  # low, medium, high, critical

explainability:
  # Set to false to skip SHAP attribution on every emitted alert (speeds up high-volume detection).
  explain_on_detection: true
  # Number of top features to attach per anomaly.
  top_k: 5

calibration:
  # Path (relative to project root) where fitted calibrators are stored.
  calibrators_path: storage/calibrators
  # Tier cutoffs applied to calibrated_prob (or ecdf_rank when prob is unavailable).
  # Scores below "medium" → "low"; below "high" → "medium"; below "critical" → "high";
  # at or above "critical" → "critical".
  tier_cutoffs:
    medium: 0.30
    high: 0.60
    critical: 0.85

# ── Service Ports (single source of truth) ──────────────────────
# All scripts, the API server, and shell utilities read from here.
# The API port serves both the REST API and the production UI (same process).
# The vite_dev port is only used during development (npm run dev).
ports:
  api: 8502               # API + UI (production)
  vllm: 8000              # vLLM OpenAI-compatible server
  vite_dev: 5173           # UI dev server only (not used in production)

# ── Log management ──────────────────────────────────────────────
# Read by sysadmin/sop_log_management.sh, scripts/api_watchdog.sh,
# and scripts/run_detection_cron.sh.
logs:
  retention_days: 14         # delete logs older than this
  max_file_size_mb: 100      # rotate any single log file larger than this
  archive_retention_days: 30 # how long to keep compressed archives

drift:
  enabled: true
  feature_drift:
    method: ks                  # "ks" (KSDrift, cheaper) or "mmd" (MMDDrift)
    persist_path: storage/drift
    p_value_threshold: 0.05
    sliding_window_size: 10     # rolling window of drift verdicts
    drift_window_min_count: 3   # trigger if >= this many recent windows show drift
    max_reference_rows: 10000   # cap reference sample (reservoir-sampled)
    n_permutations: 200         # only used for MMD method
  performance_drift:
    adwin_delta: 0.002          # ADWIN sensitivity; lower = more sensitive
  trigger:
    cooldown_days: 7            # minimum gap between retrains
    min_new_samples: 500        # don't retrain on too little new data
    cadence_days: 30            # force retrain if this many days have elapsed
  categorical_psi:
    threshold_moderate: 0.1     # PSI >= 0.1 → moderate shift
    threshold_major: 0.25       # PSI >= 0.25 → major shift (drift_detected=True)

system:
  log_level: INFO              # use DEBUG only for troubleshooting
  name: Anomaly Detection System
  output_dir: results
  # Enhanced system settings
  enable_rich_output: true
  save_agent_dialogue: true
  save_evidence_chains: true
  export_formats:
    - json
    - markdown
    - html

active_learning:
  # Active Anomaly Discovery (Das et al., ICDM 2016)
  # Reweights IsolationForest trees using analyst TP/FP labels so the
  # unsupervised layer learns from feedback, not just the supervised head.
  aad_enabled: true
  # Minimum labeled samples (TP + FP combined) required before fitting weights.
  # Below this threshold the weight file is not written / overwritten.
  min_feedback_samples: 20
  # How often the scheduled weight-refresh job should run (informational;
  # the pipeline/cron reads this value — it does not self-schedule here).
  refresh_interval_days: 7
  # Gradient descent settings (tune if convergence is slow or noisy)
  n_iter: 200
  lr: 0.01
  C: 1.0